app = "agents-haus-runtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

# No [http_service] — each machine is an always-on agent process
# managed individually via the Fly Machines API.

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
